[package]
name = "poulpy-pir"
version = "0.1.0"
edition = "2024"

[dependencies]
poulpy-core = { path = "../poulpy/poulpy-core" }
poulpy-hal = { path = "../poulpy/poulpy-hal" }
poulpy-cpu-ref = { path = "../poulpy/poulpy-cpu-ref", features = ["enable-core"] }
poulpy-cpu-avx = { path = "../poulpy/poulpy-cpu-avx", features = ["enable-avx"] }

[[bench]]
name = "packing"
path = "benches/packing/main.rs"
harness = false

[[bench]]
name = "poly_eval"
path = "benches/poly_eval/main.rs"
harness = false
